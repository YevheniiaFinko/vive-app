<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Alex — AI Wellness</title>
  <meta name="description" content="Your personal AI wellness coach" />
  <meta name="theme-color" content="#4A9EDF" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Alex" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      background: #D8E8F5;
      background-image:
        radial-gradient(ellipse at 20% 50%, rgba(74,158,223,0.18) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 20%, rgba(78,203,168,0.15) 0%, transparent 55%);
      font-family: -apple-system, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    #root {
      width: 390px;
      height: 844px;
      max-height: 100vh;
      border-radius: 44px;
      overflow: hidden;
      box-shadow:
        0 0 0 10px #1A2433,
        0 0 0 12px #2E3A4A,
        0 40px 80px rgba(0,0,0,0.35),
        0 20px 40px rgba(0,0,0,0.2);
      position: relative;
      flex-shrink: 0;
      /* makes position:fixed children anchor to this frame, not viewport */
      transform: translateZ(0);
    }

    /* Notch */
    #root::before {
      content: '';
      position: absolute;
      top: 0; left: 50%;
      transform: translateX(-50%);
      width: 120px; height: 34px;
      background: #1A2433;
      border-radius: 0 0 20px 20px;
      z-index: 9999;
    }

    @media (max-width: 440px) {
      html, body { display: block; background: #F5F9FF; }
      #root {
        width: 100vw; height: 100dvh;
        border-radius: 0; box-shadow: none;
      }
      #root::before { display: none; }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/main.jsx"></script>
</body>
</html>
